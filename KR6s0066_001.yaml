body:
  text: 三名微密含多義妙德妙首妙吉祥過去無量阿僧祇號龍種上尊王佛見在摩尼寶積佛常喜世界居北方爰自帝胄稱法王無上之心能獨悟功高積塵邈遐曠豈有名數可為言一遇正覺育靈珠遂超玄境登道位大智化度無量衆演暢實義藏一乘恢廓河沙扇真風昭映幽冥朗千日圓應密會神通力具體微妙運天機彌綸宇宙藹慈悲影迹不疾動常寂能使聞者成解脫能使見者發信心事不動智起因行智照無二惟一體如來昔居光明藏乃為衆生求大乘表依圓照斷無明悉離種種顛倒想虛空性故常不動無起滅如來藏中菩薩發此清淨心令修行不墮邪見世尊曩在室羅伐獨以智德為上首如來所説無上道是何成就方便門乃云覺海性澄圓復道圓澄覺元妙惟此元明照生所所立性妄元照亡由來迷妄有虛空依所生空立世界妄想澄凝成國土妄心知覺作衆生要知空生大覺中此如巨海一漚發彼有漏微塵國土悉皆依彼空所生是漚即滅空本無而況所生三有界歸于本元性無二故此方便有多門聖性根源無不通無分順逆皆方便初發心入三昧者遲速有異不同倫發啓如是妙菩提一字遍包一切義成就無始與無盡永成佛道賴慈津
